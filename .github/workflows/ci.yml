name: CI/CD MS Mascota

on:
  push:
    branches: [ "main" ]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Build and Push a ECR
        run: |
          docker build -t ${{ secrets.ECR_REPO_URL_MASCOTA }}:latest .
          docker push ${{ secrets.ECR_REPO_URL_MASCOTA }}:latest

      - name: Desplegar MS Mascota vía SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_MASCOTA_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands":[
                "set -e",
                "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
                "docker pull ${{ secrets.ECR_REPO_URL_MASCOTA }}:latest",
                "docker stop ms-mascota || true",
                "docker rm ms-mascota || true",
                "docker run -d --name ms-mascota -p 8081:8081 -e JAVA_OPTS=\"-Xmx250m\" --memory=\"350m\" -e DB_URL=\"${{ secrets.DB_URL }}\" -e DB_USERNAME=\"${{ secrets.DB_USERNAME }}\" -e DB_PASSWORD=\"${{ secrets.DB_PASSWORD }}\" -e EUREKA_URL=\"${{ secrets.EUREKA_URL }}\" ${{ secrets.ECR_REPO_URL_MASCOTA }}:latest"
              ]
            }' \
            --query "Command.CommandId" \
            --output text)
            
          echo "Comando enviado con ID: $COMMAND_ID. Esperando ejecución..."
            
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_MASCOTA_INSTANCE_ID }}
            
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_MASCOTA_INSTANCE_ID }} \
            --query "StandardOutputContent" \
            --output text