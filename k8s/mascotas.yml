# ========================================================
# 1. DEPLOYMENT DE RABBITMQ
# ========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management
        ports:
        - containerPort: 5672
        - containerPort: 15672
        env:
        - name: RABBITMQ_DEFAULT_USER
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: rabbitmq-username
        - name: RABBITMQ_DEFAULT_PASS
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: rabbitmq-password
---
# ========================================================
# 2. SERVICIO DE RABBITMQ
# ========================================================
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
spec:
  selector:
    app: rabbitmq
  ports:
  - protocol: TCP
    port: 5672
    targetPort: 5672
    name: amqp
  - protocol: TCP
    port: 15672
    targetPort: 15672
    name: management
---
# ========================================================
# 3. TU DEPLOYMENT DE MASCOTAS (Modificado con RabbitMQ y Secretos)
# ========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mascotas-deployment
  labels:
    app: ms-mascotas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-mascotas
  template:
    metadata:
      labels:
        app: ms-mascotas
    spec:
      containers:
      - name: ms-mascotas
        image: 782424855823.dkr.ecr.us-east-1.amazonaws.com/ms-mascotas:${IMAGE_TAG}
        ports:
        - containerPort: 8081
        env:
        - name: DB_URL
          value: "jdbc:postgresql://sanosdb-service:5432/db_mascotas"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: db-username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: db-password
        - name: EUREKA_URL
          value: "http://eureka-service:8761/eureka/"
        - name: SPRING_DATA_REDIS_HOST
          value: "redis-service"
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
        - name: SPRING_RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: SPRING_RABBITMQ_PORT
          value: "5672"
        - name: SPRING_RABBITMQ_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: rabbitmq-username
        - name: SPRING_RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: rabbitmq-password
---
# ========================================================
# 4. TU SERVICIO DE MASCOTAS
# ========================================================
apiVersion: v1
kind: Service
metadata:
  name: mascotas-service
spec:
  type: ClusterIP
  selector:
    app: ms-mascotas
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081